[device]
backend = "cpu"

[functions.zero]
type = "scalar expression"
expression = "0.0"
variables = ["x", "y", "t"]

[functions.one]
type = "scalar expression"
expression = "1.0"
variables = ["x", "y"]

[mesh]
dimension = 2
"file path" = "poisson/poisson.g"
"file type" = "exodus"

[["initial conditions"]]
function = "one"
blocks = ["block_1"]
variables = ["u"]

[["boundary conditions".dirichlet]]
function = "zero"
"side sets" = ["sset_1"]
variables = ["u"]
