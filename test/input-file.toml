[device]
backend = "cpu"

[functions.zero]
type = "scalar expression"
expression = "0.0"
variables = ["x", "y"]

[functions.one]
type = "scalar expression"
expression = "1.0"
variables = ["x", "y"]

[mesh]
file_path = "poisson/poisson.g"
file_type = "exodus"

[[initial_conditions]]
function = "one"
blocks = ["block_1"]
variables = ["u"]

[[boundary_conditions.dirichlet]]
function = "zero"
side_sets = ["sset_1"]
variables = ["u"]
