problem:
  name: "Cantilever Beam"
  type: static_structural
  dimensions: 3

mesh:
  file: mesh/beam.msh
  order: 2
  refinement_level: 0

material:
  name: Steel
  density: 7850.0         # kg/m^3
  youngs modulus: 2.1e11  # Pa
  poissons ratio: 0.3

boundary conditions:
  - name: fixed_end
    type: dirichlet
    dof: [u, v, w]
    value: 0.0
    nodesets: [1]
  - name: tip_load
    type: neumann
    component: w
    value: -5000.0
    facesets: [2]

solver:
  type: direct
  library: MUMPS
  tolerance: 1.0e-10
  max_iterations: 100

output:
  format: vtk
  fields:
    - displacement
    - stress
    - strain
  frequency: 1
